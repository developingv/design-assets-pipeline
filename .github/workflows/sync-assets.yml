name: Sync Asset Library → CDN

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Extract assets from all repos
        run: bash scripts/extract.sh

      - name: Generate manifest.json
        run: bash scripts/generate-manifest.sh

      - name: Deploy to assets branch
        run: bash scripts/deploy.sh

      - name: Summary
        run: |
          echo "### Asset Sync Summary" >> $GITHUB_STEP_SUMMARY
          total=$(find build -type f | wc -l)
          echo "- Assets: $total" >> $GITHUB_STEP_SUMMARY
          echo "- Packs: $(jq '[..|objects|.id] | unique | length' manifest.json 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`assets\`" >> $GITHUB_STEP_SUMMARY
          echo "- CDN: \`https://cdn.jsdelivr.net/gh/developingv/design-assets-pipeline@assets/\`" >> $GITHUB_STEP_SUMMARY

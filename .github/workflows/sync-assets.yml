name: Sync Asset Library → R2

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:  # manual trigger

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
  R2_REGION: auto

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          pip install --quiet awscli 2>/dev/null || true

      - name: Extract assets from all repos
        run: bash scripts/extract.sh

      - name: Generate manifest.json
        run: bash scripts/generate-manifest.sh

      - name: Upload to Cloudflare R2
        run: bash scripts/upload.sh

      - name: Show summary
        run: |
          echo "### Asset Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Total assets: $(find build -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Categories: $(ls -d build/*/ 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Packs: $(jq '[..|objects|.id] | unique | length' manifest.json 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- Disk usage: $(du -sh build | cut -f1)" >> $GITHUB_STEP_SUMMARY
